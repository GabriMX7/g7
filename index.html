<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="refresh" content="5;url=https://gabrimx7.github.io/">
    <meta name="theme-color" content="#000000">
    <title>GABRIMX7 • Redirecionando</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ffffff;
            --bg-dark: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-dim: #888888;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        /* O segredo está aqui: forçar o fundo em ambos */
        html, body {
            background-color: var(--bg-dark) !important;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Impede o scroll que revela o fundo branco */
        }

        body {
            background: radial-gradient(circle at center, #111111, #000000);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .redirect-container {
            text-align: center;
            padding: 40px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            animation: fadeIn 0.8s ease-out;
            z-index: 10;
        }

        /* Restante do seu CSS original... */
        .brand { font-weight: 900; font-size: 28px; letter-spacing: -1px; margin-bottom: 10px; }
        .brand span { color: var(--primary); text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .status-tag { background: rgba(255, 255, 255, 0.05); color: var(--primary); padding: 5px 15px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { margin: 0 0 10px; font-size: 20px; font-weight: 700; }
        p { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        .progress-wrapper { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 30px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #333, #fff); box-shadow: 0 0 15px rgba(255,255,255,0.2); animation: progress 5s linear forwards; }
        .btn-direct { text-decoration: none; color: #000; background: var(--primary); padding: 14px 30px; border-radius: 14px; font-weight: 800; font-size: 13px; display: inline-flex; align-items: center; gap: 10px; transition: all 0.3s ease; border: 1px solid white; }
        .btn-direct:hover { transform: translateY(-3px); background: transparent; color: white; box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
        @keyframes progress { from { width: 0%; } to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="redirect-container">
    <div class="brand">GABRI<span>MX7</span></div>
    <div class="status-tag">Nova URL Detectada</div>

    <h2>Estamos de mudança!</h2>
    <p>Otimizamos nossa plataforma para oferecer uma experiência mais rápida. Você será levado ao novo site em instantes.</p>

    <div class="progress-wrapper">
        <div class="progress-fill"></div>
    </div>

    <a href="https://gabrimx7.github.io/" class="btn-direct">
        ACESSAR AGORA <i class="fas fa-arrow-right"></i>
    </a>
</div>

</body>
</html>
